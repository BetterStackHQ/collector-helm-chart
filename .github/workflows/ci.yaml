name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Install Helm
        uses: azure/setup-helm@v4.3.0

      - name: Run tests
        run: |
          failed=0
          for test in tests/[0-9]*.sh; do
            echo "--- Running $test ---"
            if bash "$test"; then
              :
            else
              failed=1
            fi
          done
          exit $failed
